<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Teknova</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: #050505;
            color: #fff;
        }
        .login-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.85)), url('../img/logo.jpg') center/cover no-repeat;
        }
        .login-card {
            width: min(460px, 100%);
            background: rgba(14, 14, 14, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }
        .login-card h1 {
            margin-bottom: 16px;
            font-size: clamp(2rem, 3vw, 2.6rem);
        }
        .login-card p {
            margin-bottom: 24px;
            color: #cfd7e3;
            line-height: 1.7;
        }
        .login-card form {
            display: grid;
            gap: 18px;
        }
        .login-card label {
            display: grid;
            gap: 8px;
            font-weight: 600;
            color: #e5e7eb;
        }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
        }
        .login-card input:focus {
            outline: none;
            border-color: #0a84ff;
            box-shadow: 0 0 0 4px rgba(10,132,255,0.12);
        }
        .login-card button {
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: #0a84ff;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(10,132,255,0.25);
        }
        .login-feedback {
            margin-top: 16px;
            min-height: 24px;
            color: #cbd5e1;
        }
        .login-feedback.success {
            color: #4ade80;
        }
        .login-feedback.error {
            color: #f87171;
        }
        .login-card .footer-link {
            margin-top: 24px;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        .login-card .footer-link a {
            color: #0a84ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <section class="login-hero">
        <div class="login-card">
            <h1>Inicio de sesión</h1>
            <p>Acceso de administrador temporal. Ingresa tus credenciales para continuar.</p>
            <form id="loginForm">
                <label for="username">Usuario
                    <input id="username" name="username" type="text" autocomplete="username" required>
                </label>
                <label for="password">Contraseña
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit">Ingresar</button>
            </form>
            <div id="feedback" class="login-feedback" aria-live="polite"></div>
            <div class="footer-link">
                <a href="../registro.html">Crear cuenta</a> ·
                <a href="../recuperar.html">Recuperar contraseña</a> ·
                <a href="../index.html">Volver a Inicio</a>
            </div>
        </div>
    </section>
    <script>
        const form = document.getElementById('loginForm');
        const feedback = document.getElementById('feedback');

        form.addEventListener('submit', async event => {
            event.preventDefault();
            const username = form.username.value.trim();
            const password = form.password.value.trim();

            if (!username || !password) {
                feedback.textContent = 'Completa tus credenciales.';
                feedback.className = 'login-feedback error';
                return;
            }

            feedback.textContent = 'Validando acceso...';
            feedback.className = 'login-feedback';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (!response.ok) {
                    feedback.textContent = data.message || 'Usuario o contraseña incorrectos.';
                    feedback.className = 'login-feedback error';
                    return;
                }

                feedback.textContent = `Acceso permitido. Bienvenido ${username}.`;
                feedback.className = 'login-feedback success';
                localStorage.setItem('loggedUser', username);
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 800);
            } catch (error) {
                feedback.textContent = 'No se pudo conectar con el servidor.';
                feedback.className = 'login-feedback error';
            }
        });
    </script>
</body>
</html>
