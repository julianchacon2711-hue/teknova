<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Teknova</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #050505;
            color: #fff;
        }
        .recover-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.85)), url('img/logo.jpg') center/cover no-repeat;
        }
        .recover-card {
            width: min(520px, 100%);
            background: rgba(14, 14, 14, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }
        .recover-card h1 {
            margin-bottom: 16px;
            font-size: clamp(2rem, 3vw, 2.6rem);
        }
        .recover-card p {
            margin-bottom: 24px;
            color: #cfd7e3;
            line-height: 1.7;
        }
        .recover-card form {
            display: grid;
            gap: 18px;
        }
        .recover-card label {
            display: grid;
            gap: 8px;
            font-weight: 600;
            color: #e5e7eb;
        }
        .recover-card input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
        }
        .recover-card input:focus {
            outline: none;
            border-color: #0a84ff;
            box-shadow: 0 0 0 4px rgba(10,132,255,0.12);
        }
        .recover-card button {
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: #0a84ff;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .recover-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(10,132,255,0.25);
        }
        .recover-feedback {
            margin-top: 16px;
            min-height: 24px;
            color: #cbd5e1;
        }
        .recover-feedback.success {
            color: #4ade80;
        }
        .recover-feedback.error {
            color: #f87171;
        }
        .recover-card .footer-link {
            margin-top: 24px;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        .recover-card .footer-link a {
            color: #0a84ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: rgba(5,5,5,.94); backdrop-filter: blur(12px); padding: 14px 24px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
        <a href="index.html" style="color:#fff; text-decoration:none; font-weight:600;">Inicio</a>
        <a href="catalogo.html" style="color:#fff; text-decoration:none; font-weight:600;">Catálogo</a>
        <a href="registro.html" style="color:#fff; text-decoration:none; font-weight:600;">Registro</a>
        <a href="img/inicio%20seccion.html" style="color:#fff; text-decoration:none; font-weight:600;">Ingresar</a>
    </header>
    <main style="padding-top:68px;">
    <section class="recover-hero">
        <div class="recover-card">
            <h1>Recuperar contraseña</h1>
            <p>Ingresa tu usuario o correo registrado para recuperar tu contraseña.</p>
            <form id="recoverForm">
                <label for="userOrEmail">Usuario o correo
                    <input id="userOrEmail" name="userOrEmail" type="text" autocomplete="username" required>
                </label>
                <button type="submit">Buscar cuenta</button>
            </form>
            <div id="feedback" class="recover-feedback" aria-live="polite"></div>
            <div id="resetSection" style="display:none; margin-top: 20px;">
                <form id="resetForm">
                    <label for="newPassword">Nueva contraseña
                        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>
                    </label>
                    <label for="confirmNewPassword">Confirmar contraseña
                        <input id="confirmNewPassword" name="confirmNewPassword" type="password" autocomplete="new-password" required>
                    </label>
                    <button type="submit">Actualizar contraseña</button>
                </form>
            </div>
            <div class="footer-link">
                <a href="img/inicio%20seccion.html">Volver a Inicio de Sesión</a> ·
                <a href="registro.html">Crear cuenta</a>
            </div>
        </div>
    </section>
    </main>
    <script>
        const recoverForm = document.getElementById('recoverForm');
        const resetSection = document.getElementById('resetSection');
        const resetForm = document.getElementById('resetForm');
        const feedback = document.getElementById('feedback');
        let recoveredUser = null;

        recoverForm.addEventListener('submit', async event => {
            event.preventDefault();
            const input = recoverForm.userOrEmail.value.trim();

            if (!input) {
                feedback.textContent = 'Ingresa tu usuario o correo.';
                feedback.className = 'recover-feedback error';
                return;
            }

            feedback.textContent = 'Buscando cuenta...';
            feedback.className = 'recover-feedback';

            try {
                const response = await fetch('/api/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userOrEmail: input })
                });
                const data = await response.json();

                if (!response.ok) {
                    feedback.textContent = data.message || 'No se encontró una cuenta con ese usuario o correo.';
                    feedback.className = 'recover-feedback error';
                    resetSection.style.display = 'none';
                    return;
                }

                recoveredUser = { username: input };
                feedback.textContent = 'Cuenta encontrada. Ingresa una nueva contraseña.';
                feedback.className = 'recover-feedback success';
                resetSection.style.display = 'block';
            } catch (error) {
                feedback.textContent = 'No se pudo conectar con el servidor.';
                feedback.className = 'recover-feedback error';
                resetSection.style.display = 'none';
            }
        });

        resetForm.addEventListener('submit', async event => {
            event.preventDefault();
            if (!recoveredUser) {
                feedback.textContent = 'Primero busca tu cuenta.';
                feedback.className = 'recover-feedback error';
                return;
            }
            const newPassword = resetForm.newPassword.value.trim();
            const confirmNewPassword = resetForm.confirmNewPassword.value.trim();

            if (!newPassword || !confirmNewPassword) {
                feedback.textContent = 'Completa ambos campos de contraseña.';
                feedback.className = 'recover-feedback error';
                return;
            }

            if (newPassword !== confirmNewPassword) {
                feedback.textContent = 'Las contraseñas no coinciden.';
                feedback.className = 'recover-feedback error';
                return;
            }

            try {
                const response = await fetch('/api/recover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userOrEmail: recoveredUser.username, newPassword, confirmNewPassword })
                });
                const data = await response.json();

                if (!response.ok) {
                    feedback.textContent = data.message || 'No se pudo actualizar la contraseña.';
                    feedback.className = 'recover-feedback error';
                    return;
                }

                feedback.textContent = 'Contraseña actualizada. Ahora inicia sesión con tu nueva contraseña.';
                feedback.className = 'recover-feedback success';
                resetSection.style.display = 'none';
                resetForm.reset();
            } catch (error) {
                feedback.textContent = 'No se pudo conectar con el servidor.';
                feedback.className = 'recover-feedback error';
            }
        });
    </script>
</body>
</html>
