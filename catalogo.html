<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Teknova</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="img/logo.jpg" alt="Julian David" class="logo">
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="index.html#servicios">Servicios</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="index.html#contacto">Contacto</a>
        </nav>
    </header>

    <main class="catalogo-page">
        <section class="catalogo-hero">
            <div class="hero-content">
                <h1>Catálogo de Productos</h1>
                <h2>Explora accesorios y encuentra lo que necesitas.</h2>
                <p>Descubre lo mejor en tecnología con un estilo moderno y funcional.</p>
            </div>
        </section>

        <section class="catalogo-section">
            <div class="catalogo-toolbar">
                <label class="catalogo-search">
                    <span class="sr-only">Buscar producto</span>
                    <input id="catalogoSearch" type="search" placeholder="Buscar producto">
                </label>
                <label class="catalogo-select">
                    <span class="sr-only">Filtrar categoría</span>
                    <select id="catalogoCategory"></select>
                </label>
            </div>

            <div id="catalogoGrid" class="catalogo-grid"></div>
            <p id="catalogoEmpty" class="catalogo-empty">No hay productos que coincidan con tu búsqueda.</p>
        </section>
    </main>

    <div id="galeriaModal" class="galeria-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="galeriaTitulo">
        <div class="galeria-contenido">
            <button type="button" class="cerrar" aria-label="Cerrar galería">×</button>
            <h2 id="galeriaTitulo" class="sr-only">Galería de accesorios</h2>
            <div id="galeriaContenido" class="galeria-items"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Teknova. Todos los derechos reservados.</p>
    </footer>

    <!-- Enlazo el archivo JavaScript del catálogo dinámico -->
    <script src="catalogo.js"></script>
</body>
</html>
